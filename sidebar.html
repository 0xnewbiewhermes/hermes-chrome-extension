<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo">⚡</div>
        <div class="header-info">
          <h1>Hermes</h1>
          <span class="status" id="status">Connecting...</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="clearBtn" class="icon-btn" title="Clear chat">🗑️</button>
        <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
      </div>
    </div>

    <!-- Page Context Bar -->
    <div class="context-bar" id="contextBar">
      <div class="context-info">
        <span class="context-icon">🌐</span>
        <span class="context-text" id="pageContext">No page context</span>
      </div>
      <button id="toggleContext" class="icon-btn small" title="Toggle page context">📎</button>
    </div>

    <!-- Chat Messages -->
    <div class="chat-container" id="chatContainer">
      <div class="welcome-message">
        <div class="welcome-icon">⚡</div>
        <h2>Hermes Assistant</h2>
        <p>Asisten pribadi kamu di kala browsing. Tanya apa aja!</p>
        <div class="quick-actions">
          <button class="quick-btn" data-prompt="Summarize this page">📝 Summarize</button>
          <button class="quick-btn" data-prompt="Explain this page in simple terms">💡 Explain</button>
          <button class="quick-btn" data-prompt="What are the key points?">🔑 Key Points</button>
          <button class="quick-btn" data-prompt="Find related articles">🔍 Related</button>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea 
          id="messageInput" 
          placeholder="Tanya Hermes..." 
          rows="1"
          autofocus
        ></textarea>
        <button id="sendBtn" class="send-btn" disabled>
          <span class="send-icon">→</span>
        </button>
      </div>
      <div class="input-footer">
        <span class="hint">Enter to send, Shift+Enter for new line</span>
        <span class="char-count" id="charCount">0</span>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="close-btn" id="closeSettings">×</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label>API Endpoint</label>
          <input type="text" id="apiEndpoint" value="http://localhost:8642/v1" placeholder="http://localhost:8642/v1">
        </div>
        <div class="setting-group">
          <label>Include Page Context</label>
          <div class="toggle-wrapper">
            <input type="checkbox" id="includeContext" checked>
            <span class="toggle-label">Auto-send page URL and selected text</span>
          </div>
        </div>
        <div class="setting-group">
          <label>Max History Messages</label>
          <input type="number" id="maxHistory" value="20" min="5" max="100">
        </div>
        <button id="saveSettings" class="primary-btn">Save Settings</button>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
